<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Склад запчастей</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="module" id="firebase-init">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyCYK7Jftv6LcgiGqxDkH0IcWHIqb5tcXUQ",
    authDomain: "warehouse-a1b6c.firebaseapp.com",
    projectId: "warehouse-a1b6c",
    storageBucket: "warehouse-a1b6c.firebasestorage.app",
    messagingSenderId: "108353420882",
    appId: "1:108353420882:web:d359e2b2602403b3eca98b"
  });
  const db = getFirestore(app);

  window._db = {
    async getConfig() {
      const snap = await getDoc(doc(db, "config", "main"));
      return snap.exists() ? snap.data() : null;
    },
    async setConfig(data) {
      await setDoc(doc(db, "config", "main"), data);
    },
    async getAllCells() {
      const snap = await getDocs(collection(db, "cells"));
      const obj = {};
      snap.forEach(d => { obj[d.id] = d.data(); });
      return obj;
    },
    async setCell(id, data) {
      await setDoc(doc(db, "cells", id), data);
    }
  };
  window._dbReady = true;
  window.dispatchEvent(new Event("db-ready"));
</script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', 'Helvetica Neue', sans-serif; background: #fafaf8; color: #1a1a1a; }
  input, textarea, button { font-family: inherit; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const DEFAULT_CONFIG = { zones: [{ id: "A", label: "Зона A", rows: 4, cols: 6 }] };

function waitForDb() {
  return new Promise(resolve => {
    if (window._dbReady) { resolve(); return; }
    window.addEventListener("db-ready", () => resolve(), { once: true });
  });
}

function cellId(zoneId, row, col) {
  return `${zoneId}-${String(row+1).padStart(2,"0")}-${String(col+1).padStart(2,"0")}`;
}
const LOGO = `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="currentColor"><polygon points="100,20 175,170 25,170" opacity="0.15"/><polygon points="100,20 175,170 25,170" fill="none" stroke="currentColor" stroke-width="8"/><polygon points="60,170 140,170 115,110 85,110" opacity="0.7"/></svg>`;
const iSt = { border:"1px solid #e0e0e0", borderRadius:6, padding:"7px 10px", fontSize:13, outline:"none", width:"100%", boxSizing:"border-box" };

function App() {
  const [cells, setCells] = useState({});
  const [config, setConfig] = useState(DEFAULT_CONFIG);
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [view, setView] = useState("grid");
  const [modal, setModal] = useState(null);
  const [printCell, setPrintCell] = useState(null);
  const [archiveCell, setArchiveCell] = useState(null);
  const [configOpen, setConfigOpen] = useState(false);
  const [search, setSearch] = useState("");
  const [newZone, setNewZone] = useState({ label:"", rows:3, cols:5, customId:"" });
  const [labelModal, setLabelModal] = useState(null);
  const pollRef = useRef(null);

  const loadAll = async () => {
    await waitForDb();
    try {
      const [cfg, cls] = await Promise.all([window._db.getConfig(), window._db.getAllCells()]);
      if (cfg) setConfig(cfg);
      setCells(cls);
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  useEffect(() => {
    loadAll();
    pollRef.current = setInterval(loadAll, 8000);
    return () => clearInterval(pollRef.current);
  }, []);

  const saveConfig = async (cfg) => {
    setConfig(cfg); setSyncing(true);
    await window._db.setConfig(cfg);
    setSyncing(false);
  };

  const saveCell = async (id, data) => {
    const updated = { ...data, openedAt: data.openedAt || new Date().toLocaleDateString("ru-RU") };
    setCells(prev => ({ ...prev, [id]: updated }));
    setModal(null); setSyncing(true);
    await window._db.setCell(id, updated);
    setSyncing(false);
  };

  const freeCell = async (id) => {
    const cell = cells[id]; if (!cell) return;
    const archive = cell._archive || [];
    const updated = { _archive: [...archive, { ...cell, freedAt: new Date().toLocaleDateString("ru-RU") }] };
    setCells(prev => ({ ...prev, [id]: updated }));
    setModal(null); setArchiveCell(null); setSyncing(true);
    await window._db.setCell(id, updated);
    setSyncing(false);
  };

  const openCell = (id, zone, row, col) => setModal({ id, zone, row, col, cell: cells[id] || null });

  const allCells = config.zones.flatMap(z =>
    Array.from({length:z.rows},(_,r) => Array.from({length:z.cols},(_,c) => {
      const id = cellId(z.id,r,c);
      return { id, zone:z, row:r, col:c, data:cells[id] };
    })).flat()
  );
  const occupied = allCells.filter(c => c.data?.orderNum).length;
  const total = allCells.length;
  const filtered = search.trim() ? allCells.filter(c => {
    const s = search.toLowerCase();
    return c.id.toLowerCase().includes(s) || c.data?.car?.toLowerCase().includes(s) ||
      c.data?.orderNum?.toLowerCase().includes(s) ||
      c.data?.parts?.some(p => p.name?.toLowerCase().includes(s) || p.article?.toLowerCase().includes(s));
  }) : [];

  if (loading) return (
    <div style={{minHeight:"100vh",background:"#0f0f0f",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{width:48,height:48,color:"#fff"}} dangerouslySetInnerHTML={{__html:LOGO}}/>
      <div style={{color:"#aaa",fontFamily:"monospace",letterSpacing:2,fontSize:13}}>ЗАГРУЗКА СКЛАДА...</div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#fafaf8"}}>
      <header style={{background:"#0f0f0f",color:"#fff",padding:"0 2rem",display:"flex",alignItems:"center",gap:"1rem",height:60}}>
        <div style={{width:30,height:30,color:"#fff"}} dangerouslySetInnerHTML={{__html:LOGO}}/>
        <span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:500,fontSize:14,letterSpacing:2,textTransform:"uppercase"}}>СКЛАД ЗАПЧАСТЕЙ</span>
        <div style={{flex:1}}/>
        {syncing && <div style={{fontSize:12,color:"#666",fontFamily:"monospace"}}>⟳ сохранение...</div>}
        <div style={{background:"#1e1e1e",borderRadius:6,padding:"4px 14px",fontSize:13,color:"#aaa"}}>
          <span style={{color:occupied>0?"#ff9800":"#4caf50",fontWeight:600}}>{occupied}</span>
          <span style={{color:"#555"}}> / {total} занято</span>
        </div>
        <button onClick={loadAll} style={{background:"none",border:"1px solid #333",color:"#aaa",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:13}} title="Обновить">↻</button>
        <button onClick={() => setConfigOpen(true)} style={{background:"none",border:"1px solid #333",color:"#aaa",borderRadius:6,padding:"5px 14px",cursor:"pointer",fontSize:13}}>⚙ Настройки</button>
      </header>
      <div style={{background:"#fff",borderBottom:"1px solid #e8e8e8",display:"flex",padding:"0 2rem"}}>
        {[["grid","🗺 Схема склада"],["search","🔍 Поиск"],["labels","🖨 Печать"]].map(([key,label]) => (
          <button key={key} onClick={() => setView(key)} style={{background:"none",border:"none",borderBottom:view===key?"2px solid #0f0f0f":"2px solid transparent",padding:"14px 18px",cursor:"pointer",fontSize:13,fontWeight:view===key?600:400,color:view===key?"#0f0f0f":"#666",transition:"all 0.15s"}}>{label}</button>
        ))}
      </div>
      <main style={{padding:"2rem",maxWidth:1200,margin:"0 auto"}}>
        {view==="grid" && <GridView config={config} cells={cells} onOpen={openCell}/>}
        {view==="search" && <SearchView allCells={allCells} search={search} setSearch={setSearch} filtered={filtered} onOpen={openCell} onArchive={setArchiveCell}/>}
        {view==="labels" && <LabelsView config={config} cells={cells} onPrint={setPrintCell} onLabelPrint={setLabelModal}/>}
      </main>
      {modal && <CellModal modal={modal} onSave={saveCell} onFree={freeCell} onArchive={setArchiveCell} onClose={() => setModal(null)}/>}
      {printCell && <PrintSheet cell={printCell} cells={cells} onClose={() => setPrintCell(null)}/>}
      {archiveCell && <ArchiveModal cellId={archiveCell} cells={cells} onFree={freeCell} onClose={() => setArchiveCell(null)}/>}
      {configOpen && <ConfigModal config={config} setConfig={saveConfig} newZone={newZone} setNewZone={setNewZone} onClose={() => setConfigOpen(false)}/>}
      {labelModal && <LabelPrintModal zone={labelModal} onClose={() => setLabelModal(null)}/>}
    </div>
  );
}

function GridView({config,cells,onOpen}) {
  return (
    <div style={{display:"flex",flexDirection:"column",gap:"2.5rem"}}>
      {config.zones.map(zone => (
        <div key={zone.id}>
          <div style={{display:"flex",alignItems:"center",gap:"1rem",marginBottom:"1rem"}}>
            <div style={{background:"#0f0f0f",color:"#fff",fontFamily:"'IBM Plex Mono',monospace",padding:"4px 14px",borderRadius:4,fontSize:13,letterSpacing:1}}>{zone.id}</div>
            <span style={{fontWeight:600,fontSize:16}}>{zone.label}</span>
            <span style={{color:"#999",fontSize:13}}>{zone.rows} × {zone.cols}</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:`repeat(${zone.cols},1fr)`,gap:8}}>
            {Array.from({length:zone.rows},(_,r) => Array.from({length:zone.cols},(_,c) => {
              const id = cellId(zone.id,r,c);
              const data = cells[id];
              const occ = data?.orderNum;
              return (
                <button key={id} onClick={() => onOpen(id,zone,r,c)} style={{border:`2px solid ${occ?"#ff9800":"#4caf50"}`,background:occ?"#fff8e1":"#e8f5e9",borderRadius:8,padding:"10px 8px",cursor:"pointer",textAlign:"left",transition:"all 0.15s",minHeight:80}}>
                  <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:11,fontWeight:600,color:occ?"#e65100":"#2e7d32",marginBottom:4}}>{id}</div>
                  {occ ? <>
                    <div style={{fontSize:11,fontWeight:600,color:"#333",lineHeight:1.3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{data.car}</div>
                    <div style={{fontSize:10,color:"#666",marginTop:2}}>{data.orderNum}</div>
                    <div style={{fontSize:10,color:"#999",marginTop:2}}>{data.parts?.length||0} дет.</div>
                  </> : <div style={{fontSize:11,color:"#4caf50",marginTop:4}}>+ свободна</div>}
                </button>
              );
            }))}
          </div>
        </div>
      ))}
    </div>
  );
}

function SearchView({allCells,search,setSearch,filtered,onOpen,onArchive}) {
  const occupied = allCells.filter(c => c.data?.orderNum);
  const list = search.trim() ? filtered : occupied;
  return (
    <div>
      <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Поиск по ячейке, авто, заказ-наряду, детали, артикулу..." style={{width:"100%",padding:"12px 16px",fontSize:15,border:"1px solid #ddd",borderRadius:8,outline:"none",boxSizing:"border-box",marginBottom:16}}/>
      {!search.trim() && <div style={{fontWeight:600,fontSize:15,marginBottom:12}}>Занятые ячейки ({occupied.length})</div>}
      {search.trim() && <div style={{color:"#666",fontSize:13,marginBottom:12}}>Найдено: {filtered.length}</div>}
      {list.map(({id,zone,row,col,data}) => (
        <div key={id} onClick={() => onOpen(id,zone,row,col)} style={{background:"#fff",border:"1px solid #e8e8e8",borderRadius:8,padding:"14px 18px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:"1rem"}}>
          <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:13,fontWeight:600,background:data?.orderNum?"#ff9800":"#4caf50",color:"#fff",padding:"4px 10px",borderRadius:4,whiteSpace:"nowrap"}}>{id}</div>
          {data?.orderNum
            ? <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{data.car} · {data.orderNum}</div><div style={{color:"#666",fontSize:13}}>{data.parts?.map(p=>p.name).filter(Boolean).join(", ")} · мастер: {data.master||"—"}</div></div>
            : <div style={{color:"#4caf50",fontSize:13,flex:1}}>свободна</div>}
          <button onClick={e=>{e.stopPropagation();onArchive(id);}} style={{background:"none",border:"1px solid #eee",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12,color:"#999"}}>Архив</button>
        </div>
      ))}
    </div>
  );
}

function LabelsView({config,cells,onPrint,onLabelPrint}) {
  return (
    <div>
      <div style={{color:"#666",fontSize:14,marginBottom:"1.5rem"}}>Распечатайте лист ячейки или этикетки для склада</div>
      {config.zones.map(zone => (
        <div key={zone.id} style={{marginBottom:"2rem"}}>
          <div style={{display:"flex",alignItems:"center",gap:"1rem",marginBottom:"1rem"}}>
            <div style={{background:"#0f0f0f",color:"#fff",fontFamily:"'IBM Plex Mono',monospace",padding:"4px 14px",borderRadius:4,fontSize:13}}>{zone.id}</div>
            <span style={{fontWeight:600}}>{zone.label}</span>
            <button onClick={() => onLabelPrint(zone)} style={{marginLeft:"auto",background:"#0f0f0f",color:"#fff",border:"none",borderRadius:6,padding:"6px 16px",cursor:"pointer",fontSize:13}}>🖨 Этикетки зоны</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:8}}>
            {Array.from({length:zone.rows},(_,r) => Array.from({length:zone.cols},(_,c) => {
              const id = cellId(zone.id,r,c);
              const data = cells[id];
              const occ = data?.orderNum;
              return (
                <div key={id} style={{border:"1px solid #e8e8e8",borderRadius:8,padding:12,background:"#fff"}}>
                  <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:12,color:"#666",marginBottom:6}}>{id}</div>
                  {occ && <div style={{fontSize:11,color:"#333",marginBottom:6}}>{data.car}</div>}
                  <button onClick={() => onPrint({id,zone,row:r,col:c})} style={{background:occ?"#fff8e1":"#f5f5f5",border:`1px solid ${occ?"#ffcc02":"#ddd"}`,borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:11,width:"100%"}}>
                    {occ?"📄 Лист ячейки":"📄 Пустой лист"}
                  </button>
                </div>
              );
            }))}
          </div>
        </div>
      ))}
    </div>
  );
}

function CellModal({modal,onSave,onFree,onArchive,onClose}) {
  const {id,cell} = modal;
  const isOcc = cell?.orderNum;
  const [form,setForm] = useState({
    car:cell?.car||"",plate:cell?.plate||"",orderNum:cell?.orderNum||"",
    master:cell?.master||"",openedAt:cell?.openedAt||new Date().toLocaleDateString("ru-RU"),
    notes:cell?.notes||"",parts:cell?.parts||[{name:"",article:"",qty:1}],
    _archive:cell?._archive||[]
  });
  const setPart=(i,f,v)=>setForm(fm=>{const p=[...fm.parts];p[i]={...p[i],[f]:v};return{...fm,parts:p};});
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:"1rem"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:12,width:"100%",maxWidth:640,maxHeight:"90vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
        <div style={{padding:"1.5rem",background:"#0f0f0f",borderRadius:"12px 12px 0 0",display:"flex",alignItems:"center",gap:"1rem"}}>
          <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:18,fontWeight:600,color:"#fff"}}>{id}</div>
          <div style={{flex:1,color:"#aaa",fontSize:13}}>{isOcc?`${form.car} · ${form.orderNum}`:"Свободна"}</div>
          {isOcc && <button onClick={()=>onArchive(id)} style={{background:"none",border:"1px solid #444",color:"#aaa",borderRadius:6,padding:"4px 12px",cursor:"pointer",fontSize:12}}>История</button>}
          <button onClick={onClose} style={{background:"none",border:"none",color:"#aaa",fontSize:20,cursor:"pointer"}}>×</button>
        </div>
        <div style={{padding:"1.5rem"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
            {[["car","Автомобиль","Toyota Camry 2020"],["plate","Гос. номер","А 123 ВС 77"],["orderNum","Заказ-наряд №","ЗН-2025-0847"],["master","Мастер-приёмщик","Петров И.В."]].map(([f,l,ph])=>(
              <div key={f}>
                <div style={{fontSize:11,fontWeight:600,color:"#999",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>{l}</div>
                <input value={form[f]} onChange={e=>setForm(fm=>({...fm,[f]:e.target.value}))} placeholder={ph} style={iSt}/>
              </div>
            ))}
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:600,color:"#999",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>Примечания</div>
            <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} rows={2} style={{...iSt,resize:"vertical"}}/>
          </div>
          <div>
            <div style={{fontWeight:600,fontSize:13,marginBottom:8,display:"flex",justifyContent:"space-between"}}>
              ПЕРЕЧЕНЬ ЗАПЧАСТЕЙ
              <button onClick={()=>setForm(f=>({...f,parts:[...f.parts,{name:"",article:"",qty:1}]}))} style={{background:"#0f0f0f",color:"#fff",border:"none",borderRadius:4,padding:"2px 10px",cursor:"pointer",fontSize:12}}>+ добавить</button>
            </div>
            {form.parts.map((p,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 140px 60px 32px",gap:6,marginBottom:6}}>
                <input value={p.name} onChange={e=>setPart(i,"name",e.target.value)} placeholder="Наименование" style={iSt}/>
                <input value={p.article} onChange={e=>setPart(i,"article",e.target.value)} placeholder="Артикул" style={iSt}/>
                <input value={p.qty} onChange={e=>setPart(i,"qty",e.target.value)} type="number" min="1" style={iSt}/>
                <button onClick={()=>setForm(f=>({...f,parts:f.parts.filter((_,idx)=>idx!==i)}))} style={{background:"none",border:"1px solid #eee",borderRadius:4,cursor:"pointer",color:"#999",fontSize:16}}>×</button>
              </div>
            ))}
          </div>
        </div>
        <div style={{padding:"1rem 1.5rem",borderTop:"1px solid #eee",display:"flex",gap:8,justifyContent:"flex-end"}}>
          {isOcc && <button onClick={()=>{if(confirm("Освободить ячейку? Данные уйдут в архив."))onFree(id);}} style={{background:"#fff3e0",border:"1px solid #ffcc02",color:"#e65100",borderRadius:6,padding:"8px 18px",cursor:"pointer",fontSize:13,fontWeight:600}}>Освободить ячейку</button>}
          <button onClick={()=>onSave(id,form)} style={{background:"#0f0f0f",color:"#fff",border:"none",borderRadius:6,padding:"8px 24px",cursor:"pointer",fontSize:13,fontWeight:600}}>Сохранить</button>
        </div>
      </div>
    </div>
  );
}

function ArchiveModal({cellId,cells,onFree,onClose}) {
  const data = cells[cellId];
  const archive = data?._archive||[];
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1010,padding:"1rem"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:12,width:"100%",maxWidth:560,maxHeight:"80vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
        <div style={{padding:"1.25rem 1.5rem",borderBottom:"1px solid #eee",display:"flex",alignItems:"center",gap:"1rem"}}>
          <div style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,fontSize:15}}>{cellId}</div>
          <span style={{color:"#666",fontSize:13}}>История движения</span>
          <div style={{flex:1}}/>
          {data?.orderNum && <button onClick={()=>{if(confirm("Освободить?"))onFree(cellId);}} style={{background:"#fff3e0",border:"1px solid #ffcc02",color:"#e65100",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>Освободить</button>}
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#999"}}>×</button>
        </div>
        <div style={{padding:"1.25rem 1.5rem"}}>
          {archive.length===0 && <div style={{color:"#999",fontSize:14}}>История пуста</div>}
          {archive.map((entry,i)=>(
            <div key={i} style={{border:"1px solid #eee",borderRadius:8,padding:14,marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontWeight:600,fontSize:14}}>{entry.car} · {entry.orderNum}</span>
                <span style={{fontSize:12,color:"#999"}}>{entry.openedAt} → {entry.freedAt}</span>
              </div>
              <div style={{fontSize:13,color:"#666"}}>Мастер: {entry.master||"—"} · {entry.parts?.length||0} деталей</div>
              {entry.parts?.length>0 && <div style={{marginTop:6,fontSize:12,color:"#888"}}>{entry.parts.map(p=>p.name).filter(Boolean).join(", ")}</div>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ConfigModal({config,setConfig,newZone,setNewZone,onClose}) {
  const [confirmDelete,setConfirmDelete] = useState(null);
  const [editingId,setEditingId] = useState({});
  const addZone=()=>{
    if(!newZone.label.trim())return;
    const autoId=newZone.label.replace(/[^A-Za-z0-9]/g,"").slice(0,3).toUpperCase()||("Z"+(config.zones.length+1));
    const id=(newZone.customId||"").trim().toUpperCase()||autoId;
    if(config.zones.find(z=>z.id===id)){setNewZone(n=>({...n,_err:"Индекс уже занят"}));return;}
    setConfig({...config,zones:[...config.zones,{id,label:newZone.label,rows:+newZone.rows,cols:+newZone.cols}]});
    setNewZone({label:"",rows:3,cols:5,customId:"",_err:""});
  };
  const removeZone=(id)=>{setConfig({...config,zones:config.zones.filter(z=>z.id!==id)});setConfirmDelete(null);};
  const updateZone=(id,field,val)=>setConfig({...config,zones:config.zones.map(z=>z.id===id?{...z,[field]:(field==="rows"||field==="cols")?+val:val}:z)});
  const commitIdChange=(oldId)=>{
    const newId=(editingId[oldId]||"").trim().toUpperCase();
    if(!newId||newId===oldId){setEditingId(e=>{const n={...e};delete n[oldId];return n;});return;}
    if(config.zones.find(z=>z.id===newId))return;
    setConfig({...config,zones:config.zones.map(z=>z.id===oldId?{...z,id:newId}:z)});
    setEditingId(e=>{const n={...e};delete n[oldId];return n;});
  };
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1020,padding:"1rem"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:12,width:"100%",maxWidth:560,maxHeight:"85vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
        <div style={{padding:"1.25rem 1.5rem",borderBottom:"1px solid #eee",display:"flex",alignItems:"center"}}>
          <span style={{fontWeight:600}}>Настройки склада</span><div style={{flex:1}}/>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#999"}}>×</button>
        </div>
        <div style={{padding:"1.5rem"}}>
          <div style={{fontWeight:600,fontSize:13,color:"#666",marginBottom:10,textTransform:"uppercase",letterSpacing:0.5}}>Зоны хранения</div>
          {config.zones.map(z=>(
            <div key={z.id} style={{border:"1px solid #eee",borderRadius:8,padding:12,marginBottom:10}}>
              <div style={{display:"grid",gridTemplateColumns:"80px 1fr 72px 72px 36px",gap:8,alignItems:"center"}}>
                <input value={editingId[z.id]!==undefined?editingId[z.id]:z.id} onChange={e=>setEditingId(ei=>({...ei,[z.id]:e.target.value.toUpperCase().slice(0,6)}))} onBlur={()=>commitIdChange(z.id)} onKeyDown={e=>{if(e.key==="Enter")e.target.blur();}} style={{...iSt,fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,textAlign:"center",background:"#0f0f0f",color:"#fff",borderColor:"#0f0f0f",letterSpacing:1,padding:"7px 4px"}}/>
                <input value={z.label} onChange={e=>updateZone(z.id,"label",e.target.value)} style={iSt}/>
                <input type="number" min="1" max="20" value={z.rows} onChange={e=>updateZone(z.id,"rows",e.target.value)} style={{...iSt,textAlign:"center"}} title="Рядов"/>
                <input type="number" min="1" max="20" value={z.cols} onChange={e=>updateZone(z.id,"cols",e.target.value)} style={{...iSt,textAlign:"center"}} title="Столбцов"/>
                <button onClick={()=>setConfirmDelete(confirmDelete===z.id?null:z.id)} style={{background:confirmDelete===z.id?"#ffeaea":"none",border:"1px solid #fcc",borderRadius:4,cursor:"pointer",color:"#e57373",fontSize:18,padding:"2px 6px",lineHeight:1}}>×</button>
              </div>
              <div style={{fontSize:11,color:"#bbb",marginTop:5}}>Рядов: {z.rows} · Столбцов: {z.cols} · Ячеек: {z.rows*z.cols}</div>
              {confirmDelete===z.id && (
                <div style={{marginTop:10,background:"#fff3f3",border:"1px solid #fcc",borderRadius:6,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:13,color:"#c62828",flex:1}}>Удалить зону <b>{z.id}</b>?</span>
                  <button onClick={()=>removeZone(z.id)} style={{background:"#c62828",color:"#fff",border:"none",borderRadius:5,padding:"5px 14px",cursor:"pointer",fontSize:13,fontWeight:600}}>Удалить</button>
                  <button onClick={()=>setConfirmDelete(null)} style={{background:"none",border:"1px solid #ddd",borderRadius:5,padding:"5px 10px",cursor:"pointer",fontSize:13}}>Отмена</button>
                </div>
              )}
            </div>
          ))}
          <div style={{border:"1px dashed #ddd",borderRadius:8,padding:12,marginTop:10}}>
            <div style={{fontSize:12,color:"#999",marginBottom:8}}>Добавить зону</div>
            <div style={{display:"grid",gridTemplateColumns:"80px 1fr 72px 72px auto",gap:8}}>
              <input value={newZone.customId||""} onChange={e=>setNewZone(n=>({...n,customId:e.target.value.toUpperCase().slice(0,6),_err:""}))} placeholder="B" maxLength={6} style={{...iSt,fontFamily:"'IBM Plex Mono',monospace",textAlign:"center",fontWeight:600}}/>
              <input value={newZone.label} onChange={e=>setNewZone(n=>({...n,label:e.target.value,_err:""}))} placeholder="Название зоны" style={{...iSt,borderColor:newZone._err?"#e57373":undefined}} onKeyDown={e=>{if(e.key==="Enter")addZone();}}/>
              <input type="number" min="1" max="20" value={newZone.rows} onChange={e=>setNewZone(n=>({...n,rows:e.target.value}))} style={{...iSt,textAlign:"center"}} title="Рядов"/>
              <input type="number" min="1" max="20" value={newZone.cols} onChange={e=>setNewZone(n=>({...n,cols:e.target.value}))} style={{...iSt,textAlign:"center"}} title="Столбцов"/>
              <button onClick={addZone} style={{background:"#0f0f0f",color:"#fff",border:"none",borderRadius:6,padding:"7px 16px",cursor:"pointer",fontSize:13}}>+</button>
            </div>
            {newZone._err && <div style={{fontSize:12,color:"#e57373",marginTop:6}}>{newZone._err}</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

function LabelPrintModal({zone,onClose}) {
  const cells = Array.from({length:zone.rows},(_,r)=>Array.from({length:zone.cols},(_,c)=>cellId(zone.id,r,c))).flat();
  const doPrint=()=>{
    const w=window.open("","_blank");
    w.document.write(`<html><head><title>Этикетки ${zone.label}</title><style>body{margin:0;font-family:'IBM Plex Mono',monospace}.grid{display:grid;grid-template-columns:repeat(4,1fr)}.label{border:1px solid #333;width:52mm;height:30mm;display:flex;flex-direction:column;align-items:center;justify-content:center;box-sizing:border-box}.top{font-size:8pt;color:#666;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}.num{font-size:18pt;font-weight:700;letter-spacing:2px}@media print{@page{size:A4;margin:8mm}}</style></head><body><div class="grid">${cells.map(id=>`<div class="label"><div class="top">ЯЧЕЙКА</div><div class="num">${id}</div></div>`).join("")}</div><script>window.print();<\/script></body></html>`);
    w.document.close();
  };
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1030}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:12,padding:"2rem",maxWidth:400,width:"90%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
        <div style={{fontSize:40,marginBottom:16}}>🖨</div>
        <div style={{fontWeight:600,fontSize:16,marginBottom:8}}>Печать этикеток</div>
        <div style={{color:"#666",fontSize:14,marginBottom:"1.5rem"}}>{zone.label} · {zone.rows*zone.cols} этикеток</div>
        <button onClick={doPrint} style={{background:"#0f0f0f",color:"#fff",border:"none",borderRadius:8,padding:"10px 32px",cursor:"pointer",fontSize:14,fontWeight:600,marginRight:8}}>Печатать</button>
        <button onClick={onClose} style={{background:"none",border:"1px solid #ddd",borderRadius:8,padding:"10px 20px",cursor:"pointer",fontSize:14}}>Отмена</button>
      </div>
    </div>
  );
}

function PrintSheet({cell,cells,onClose}) {
  const {id}=cell; const data=cells[id]||{}; const today=new Date().toLocaleDateString("ru-RU");
  const doPrint=()=>{
    const w=window.open("","_blank"); const parts=data.parts||[]; const rows=Math.max(8,parts.length+2);
    w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Лист ячейки ${id}</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Helvetica Neue',Arial,sans-serif;font-size:10pt;color:#1a1a1a;padding:15mm;background:#fff}.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;border-bottom:2px solid #1a1a1a;padding-bottom:10px}.title{font-size:18pt;font-weight:700;letter-spacing:1px;text-transform:uppercase}.subtitle{font-size:9pt;color:#666;margin-top:3px}.badge{background:#1a1a1a;color:#fff;font-size:18pt;font-weight:700;padding:8px 16px;border-radius:4px;font-family:'Courier New',monospace;letter-spacing:2px}.meta-row{display:flex;margin-bottom:14px}.meta-box{border:1px solid #ddd;padding:10px 14px;flex:1}.meta-box:first-child{border-right:none}.meta-label{font-size:7pt;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}.meta-val{font-size:12pt;font-weight:600}.section{margin-bottom:14px}.section-title{background:#1a1a1a;color:#fff;padding:5px 10px;font-size:8pt;font-weight:700;letter-spacing:1px;text-transform:uppercase}table{width:100%;border-collapse:collapse;font-size:9pt}th{background:#1a1a1a;color:#fff;padding:5px 8px;text-align:left;font-size:8pt}td{border:1px solid #ddd;padding:6px 8px;vertical-align:middle}tr:nth-child(even) td{background:#fafafa}.check{width:20px;height:20px;border:1.5px solid #999;display:inline-block;border-radius:2px}.notes-box{border:1px solid #ddd;min-height:55px;padding:8px;font-size:9pt}.footer{margin-top:20px;border-top:1px solid #ddd;padding-top:8px;display:flex;justify-content:space-between;font-size:8pt;color:#999}@media print{@page{size:A4 portrait;margin:12mm}body{padding:0}}</style></head><body><div class="header"><div><div class="title">Лист ячейки склада запчастей</div><div class="subtitle">Заказ-наряд № ${data.orderNum||"—"} · ${data.car||"—"} ${data.plate?"· "+data.plate:""}</div></div><div class="badge">${id}</div></div><div class="meta-row"><div class="meta-box"><div class="meta-label">Дата открытия</div><div class="meta-val">${data.openedAt||today}</div></div><div class="meta-box"><div class="meta-label">Мастер-приёмщик</div><div class="meta-val">${data.master||"—"}</div></div></div><div class="section"><div class="section-title">Перечень запчастей</div><table><thead><tr><th style="width:30px">№</th><th>Наименование запчасти</th><th style="width:130px">Артикул / OEM</th><th style="width:50px">Кол.</th><th style="width:30px">✓</th><th style="width:110px">Дата приёмки</th><th>Состояние / Дефекты &amp; подпись</th></tr></thead><tbody>${Array.from({length:rows},(_,i)=>{const p=parts[i]||{};return`<tr><td style="text-align:center;color:#bbb">${i+1}</td><td>${p.name||""}</td><td>${p.article||""}</td><td style="text-align:center">${p.qty||""}</td><td><span class="check"></span></td><td></td><td></td></tr>`;}).join("")}</tbody></table></div><div class="section"><div class="section-title">Примечания / Особые условия хранения</div><div class="notes-box">${data.notes||""}</div></div><div class="section"><div class="section-title">История движения по ячейке</div><table><thead><tr><th style="width:110px">Дата / Время</th><th style="width:170px">Событие</th><th style="width:150px">Сотрудник (ФИО)</th><th style="width:100px">Подпись</th><th>Комментарий</th></tr></thead><tbody>${Array.from({length:7},()=>"<tr><td></td><td></td><td></td><td></td><td></td></tr>").join("")}</tbody></table></div><div class="footer"><span>Лист ячейки ${id} · ${data.car||"—"} (${data.plate||"—"}) · ${data.orderNum||"—"}</span><span>Форма СК-01 · rev 1.2</span></div><script>window.print();<\/script></body></html>`);
    w.document.close();
  };
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1040}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:12,padding:"2rem",maxWidth:400,width:"90%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
        <div style={{fontSize:40,marginBottom:16}}>📄</div>
        <div style={{fontWeight:600,fontSize:16,marginBottom:4}}>Лист ячейки {id}</div>
        {data.orderNum?<div style={{color:"#666",fontSize:13,marginBottom:"1.5rem"}}>{data.car} · {data.orderNum}</div>:<div style={{color:"#999",fontSize:13,marginBottom:"1.5rem"}}>Ячейка свободна — пустой лист</div>}
        <button onClick={doPrint} style={{background:"#0f0f0f",color:"#fff",border:"none",borderRadius:8,padding:"10px 32px",cursor:"pointer",fontSize:14,fontWeight:600,marginRight:8}}>Печатать</button>
        <button onClick={onClose} style={{background:"none",border:"1px solid #ddd",borderRadius:8,padding:"10px 20px",cursor:"pointer",fontSize:14}}>Отмена</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
